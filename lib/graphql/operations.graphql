query GetMessages($roomId: String!) {
  messages(roomId: $roomId) {
    id
    user
    text
    roomId
    createdAt
  }
}

mutation SendMessage($roomId: String!, $user: String!, $text: String!) {
  postMessage(roomId: $roomId, user: $user, text: $text)
}

subscription ListenToChat($roomId: String!) {
  messages(roomId: $roomId) {
    id
    user
    text
    roomId
    createdAt
  }
}

