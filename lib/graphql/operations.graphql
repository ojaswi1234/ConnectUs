query FetchChatHistory($roomId: String!, $after: String) {
  messages(roomId: $roomId, after: $after) {
    id
    roomId
    senderId
    user
    text
    createdAt
  }
}

mutation sendMessage($roomId: String!, $text: String!) {
  postMessage(roomId: $roomId, user: "", text: $text) {
    id
    roomId
    senderId
    user
    text
    createdAt
  }
}

mutation SendCallSignal($roomId: String!, $type: CallSignalType!, $payload: String!) {
  sendCallSignal(roomId: $roomId, type: $type, payload: $payload)
}

mutation AskAssistant($prompt: String!) {
  askAssistant(prompt: $prompt)
}

subscription ListenToChat($roomId: String!) {
  messages(roomId: $roomId) {
    id
    roomId
    senderId
    user
    text
    createdAt
  }
}

subscription ListenToCallSignals($roomId: String!) {
  callSignals(roomId: $roomId) {
    roomId
    senderId
    type
    payload
  }
}

query SearchUsers($query: String!, $platform: Platform!) {
  searchUsers(query: $query, platform: $platform) {
    id
    username
    phoneNumber
    isOnline
  }
}
