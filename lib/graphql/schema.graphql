# This file MUST be regenerated from the live server (gql codegen / introspection) 
# whenever server.js's typeDefs change. Do not hand-edit and let it drift.

type Message {
  id: ID!
  roomId: String!
  senderId: String!
  user: String!
  text: String!
  createdAt: String!
}

type UserSearchResult {
  id: ID!
  username: String!
  phoneNumber: String
  isOnline: Boolean!
}

enum Platform { MOBILE WEB }

enum CallSignalType { OFFER ANSWER ICE_CANDIDATE HANGUP }

type CallSignal {
  roomId: String!
  senderId: String!
  type: CallSignalType!
  payload: String!
}

type Query {
  messages(roomId: String!, after: String): [Message!]!
  searchUsers(query: String!, platform: Platform!): [UserSearchResult!]!
}

type Mutation {
  postMessage(roomId: String!, user: String!, text: String!): Message!
  sendCallSignal(roomId: String!, type: CallSignalType!, payload: String!): Boolean!
  askAssistant(prompt: String!): String!
}

type Subscription {
  messages(roomId: String!): Message!
  callSignals(roomId: String!): CallSignal!
}
