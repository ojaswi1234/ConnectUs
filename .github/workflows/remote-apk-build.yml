name: Remote APK Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean Project
        run: flutter clean

      # This step creates the directory and injects your secrets into the temporary .env file
      - name: Inject Secrets into Temporary .env File
        run: |
          mkdir -p assets
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> assets/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> assets/.env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> assets/.env

      - name: Install Dependencies
        run: flutter pub get

      # Built normally without extra flags since the physical file now exists during build time
      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 1